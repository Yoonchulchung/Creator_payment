spring:
  application:
    name: demo

  datasource:
    url: jdbc:mysql://localhost:3306/creator_payment?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: true

  jwt:
    secret: your-secret-key-here-must-be-at-least-32-characters
